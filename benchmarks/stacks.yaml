audio: public/anamnesia-4.mp3
reference: benchmarks/references/anamnesia-4.txt

postprocess:
  enabled: true
  model: gpt-4o
  prompt_path: benchmarks/prompts/medical-transcript-editor.md

whisper:
  model: large-v3
  device: cuda
  compute_type: int8_float16
  language: pt
  beam_size: 5
  initial_prompt: "Transcrição literal de anamnese em português brasileiro. Diálogo entre médica interna e paciente. Preservar a fala original."
  compression_ratio_threshold: 1.8
  log_prob_threshold: -0.8
  hallucination_silence_threshold: 1.0
  condition_on_previous_text: false
  vad_filter: false

stacks:
  baseline: {}

  hpf_only:
    HPF_ENABLED: true

  spectral:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6

  spectral_hpf_agc:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6
    HPF_ENABLED: true
    AGC_ENABLED: true
    LPF_ENABLED: false
    LOUDNESS_ENABLED: false
    VAD_ENABLED: false
    #VAD_THRESHOLD:0.35
    #VAD_MIN_SPEECH_DURATION_MS:100
    #VAD_MIN_SILENCE_DURATION_MS:2500
    #VAD_SPEECH_PAD_MS:600

  # --- Enhance stacks disabled for WER benchmark (RNNoise / DeepFilterNet) ---
