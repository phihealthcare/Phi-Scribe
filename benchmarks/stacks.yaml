  vad_only:
    VAD_ENABLED: true

  # Best WER (14.46%) on anamnesia-4 transcribe benchmark with VAD + loudness.
  # Pipeline: normalize → remove_hum → denoise → agc → loudness → vad
  spectral_hpf_agc_loudness_vad:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6
    HPF_ENABLED: true
    HPF_CUTOFF_HZ: 80.0
    AGC_ENABLED: true
    AGC_TARGET_DBFS: -20.0
    AGC_MAX_GAIN_DB: 12.0
    AGC_WINDOW_MS: 30
    LOUDNESS_ENABLED: true
    LOUDNESS_MODE: lufs
    LOUDNESS_TARGET_LUFS: -23.0
    LOUDNESS_TRUE_PEAK: -1.5
    LOUDNESS_LRA: 11.0
    VAD_ENABLED: true
    VAD_THRESHOLD: 0.35
    VAD_MIN_SPEECH_DURATION_MS: 100
    VAD_MIN_SILENCE_DURATION_MS: 2500
    VAD_SPEECH_PAD_MS: 600
    LPF_ENABLED: false

  spectral_hpf_agc_loudness:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6
    HPF_ENABLED: true
    AGC_ENABLED: true
    LOUDNESS_ENABLED: true
    VAD_ENABLED: false
    LPF_ENABLED: false
  
  spectral_hpf_agc_vad_conservative:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6
    HPF_ENABLED: true
    AGC_ENABLED: true
    VAD_ENABLED: true
    VAD_THRESHOLD: 0.35
    VAD_MIN_SPEECH_DURATION_MS: 100
    VAD_MIN_SILENCE_DURATION_MS: 2500
    VAD_SPEECH_PAD_MS: 600
    LPF_ENABLED: false
    LOUDNESS_ENABLED: false

  spectral_light_hpf_agc_loudness_vad:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.3
    HPF_ENABLED: true
    AGC_ENABLED: true
    LOUDNESS_ENABLED: true
    VAD_ENABLED: true
    LPF_ENABLED: false

  test_improve_describe:
    DENOISE_ENABLED: true
    DENOISE_PROP_DECREASE: 0.6
    HPF_ENABLED: true
    HPF_CUTOFF_HZ: 80.0
    AGC_ENABLED: true
    AGC_TARGET_DBFS: -20.0
    AGC_MAX_GAIN_DB: 12.0
    AGC_WINDOW_MS: 30
    LPF_ENABLED: false
    LOUDNESS_ENABLED: false
    VAD_ENABLED: false
