# Compare ffmpeg loudnorm (lufs) vs pyloudnorm constant-gain (lufs_fast).
audio: public/consulta-real-1.mp4
reference: benchmarks/references/consulta-real-1.txt

whisper:
  model: large-v3
  device: cuda
  compute_type: int8_float16
  language: pt
  beam_size: 5
  initial_prompt_file: benchmarks/prompts/whisper-initial-hotwords.txt
  compression_ratio_threshold: 1.8
  log_prob_threshold: -0.8
  hallucination_silence_threshold: 1.0
  condition_on_previous_text: false
  inference_mode: sequential
  vad_filter: false

# Production stack; only LOUDNESS_MODE changes per variant.
base_stack:
  DENOISE_ENABLED: true
  DENOISE_PROP_DECREASE: 0.6
  HPF_ENABLED: true
  HPF_CUTOFF_HZ: 80.0
  AGC_ENABLED: true
  AGC_TARGET_DBFS: -20.0
  AGC_MAX_GAIN_DB: 12.0
  AGC_WINDOW_MS: 30
  LOUDNESS_ENABLED: true
  LOUDNESS_TARGET_LUFS: -23.0
  LOUDNESS_TRUE_PEAK: -1.5
  LOUDNESS_LRA: 11.0
  LPF_ENABLED: false
  VAD_ENABLED: true
  VAD_THRESHOLD: 0.35
  VAD_MIN_SPEECH_DURATION_MS: 100
  VAD_MIN_SILENCE_DURATION_MS: 2500
  VAD_SPEECH_PAD_MS: 600

variants:
  loudness_lufs_original:
    description: "Original — ffmpeg loudnorm (LOUDNESS_MODE=lufs)"
    stack_overrides:
      LOUDNESS_MODE: lufs

  loudness_lufs_fast:
    description: "Optimized — pyloudnorm + constant gain (LOUDNESS_MODE=lufs_fast)"
    stack_overrides:
      LOUDNESS_MODE: lufs_fast
