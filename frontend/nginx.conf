server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Consultation audio uploads can be large and slow (see MAX_CONTENT_LENGTH
    # in app/config.py) and SOAP/ASR-fix LLM calls can take minutes — match
    # the backend's own generous timeouts (Dockerfile GUNICORN_TIMEOUT).
    client_max_body_size 120M;
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
